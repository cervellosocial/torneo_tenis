<html lang="es">
<head>

    <style>
        /* Estilos Base de la Página */
        #fp-clubs-layout {
            font-family: 'Segoe UI', Arial, sans-serif !important;
            background-color: #f4f6f8 !important;
            margin: 0 !important;
            padding: 0 !important;
            min-height: 100vh;
        }

        /* --- BANNER SUPERIOR PREMIUM --- */
        .hero-banner {
            background-color: #0e2234 !important;
            background-image: linear-gradient(180deg, #0e2234 0%, #0a1826 100%) !important;
            height: 160px !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            border-bottom: 4px solid #a4b300 !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15) !important;
        }

        .logo-placeholder {
            color: #ffffff !important;
            font-size: 32px !important;
            font-weight: 800 !important;
            letter-spacing: 1px !important;
            text-transform: uppercase !important;
            font-style: italic !important;
        }

        .logo-placeholder span {
            color: #a4b300 !important;
        }

        /* --- CONTENEDOR MULTI-CLUB --- */
        .rankings-grid {
            max-width: 1350px !important;
            margin: -40px auto 50px auto !important;
            padding: 0 20px !important;
            display: grid !important;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)) !important;
            gap: 30px !important;
        }

        /* --- TARJETA DE MARCADOR CLÁSICO --- */
        .ranking-card {
            background-color: #fdfbf7 !important;
            border-radius: 8px !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1) !important;
            border: 1px solid #e3dfd5 !important;
            padding: 20px 0 0 0 !important;
            overflow: hidden !important;
            transition: transform 0.3s ease !important;
            display: flex !important;
            flex-direction: column !important;
        }

        .ranking-card:hover {
            transform: translateY(-5px) !important;
        }

        /* Cabecera interna del Club (Estructura de 3 columnas) */
        .card-header {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            padding: 0 20px 15px 20px !important;
            background-color: #fdfbf7 !important;
        }

        /* Izquierda: Logo Azul con Siglas */
        .club-siglas-logo {
            background-color: #0f2439 !important;
            color: #ffffff !important;
            width: 45px !important;
            height: 45px !important;
            border-radius: 50% !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            font-weight: 800 !important;
            font-size: 14px !important;
            font-style: italic !important;
            letter-spacing: 0.5px !important;
            border: 2px solid #a4b300 !important;
            flex-shrink: 0 !important;
        }

        /* Centro: Texto del Club */
        .club-info-text {
            color: #0f2439 !important;
            font-size: 15px !important;
            font-weight: 700 !important;
            line-height: 1.3 !important;
            text-transform: uppercase !important;
            letter-spacing: 0.5px !important;
            flex-grow: 1 !important;
            padding: 0 15px !important;
            text-align: left !important;
        }

        /* Derecha: Escudo PNG opcional */
        .club-shield-emblem {
            width: 45px !important;
            height: 45px !important;
            object-fit: contain !important;
            flex-shrink: 0 !important;
        }

        /* --- TABLA INTERNA --- */
        .ranking-table {
            width: 100% !important;
            border-collapse: collapse !important;
        }
