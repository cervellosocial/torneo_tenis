        /* Contenedor adaptado a la estética de la página inicial */
        #final-point-groups-container {
            font-family: 'Segoe UI', Arial, sans-serif !important;
            background-color: #f8f9fa !important; /* Fondo gris claro limpio */
            margin: 0 !important;
            padding: 40px 20px !important;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Envoltura de cada grupo para darle aire al diseño */
        .group-section {

            margin: 0 auto 50px auto !important;
        }

        /* Título del Grupo (Coherente con la tipografía e identidad) */
        .group-title {
            color: #0f2439 !important; /* Azul oscuro */

            font-weight: 800 !important;

            letter-spacing: 1px !important;

        .table-responsive-wrapper {

            overflow-x: auto !important; /* Permite scroll horizontal en móviles si es necesario */
        }

        /* Tabla de Clasificación Estilo Excel Premium */
        .ranking-table {

            letter-spacing: 0.5px !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important; /* Celdas superiores finas */
            text-align: center !important;
        }
