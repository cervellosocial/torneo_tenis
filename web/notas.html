<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Point - Club Rankings</title>
    <style>
        /* Estilos Base de la Página */
        #fp-clubs-layout {
            font-family: 'Segoe UI', Arial, sans-serif !important;
            background-color: #f4f6f8 !important;
            margin: 0 !important;
            padding: 0 !important;
            min-height: 100vh;
        }

        /* --- BANNER SUPERIOR PREMIUM --- */
        .hero-banner {
            background-color: #0e2234 !important;
            background-image: linear-gradient(180deg, #0e2234 0%, #0a1826 100%) !important;
            height: 160px !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            border-bottom: 4px solid #a4b300 !important; /* Fina línea verde tenis */
            box-shadow: 0 4px 15px rgba(0,0,0,0.15) !important;
        }

        /* Logotipo simulado de Final Point */
        .logo-placeholder {
            color: #ffffff !important;
            font-size: 32px !important;
            font-weight: 800 !important;
            letter-spacing: 1px !important;
            text-transform: uppercase !important;
            font-style: italic !important;
        }

        .logo-placeholder span {
            color: #a4b300 !important;
        }

        /* --- CONTENEDOR MULTI-CLUB (GRID DE 3) --- */
        .rankings-grid {
            max-width: 1200px !important;
            margin: -40px auto 50px auto !important; /* Desplazado hacia arriba para pisar el banner como en tu idea */
            padding: 0 20px !important;
            display: grid !important;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)) !important;
            gap: 30px !important;
        }

        /* --- TARJETA DE MARCADOR CLÁSICO --- */
        .ranking-card {
            background-color: #fdfbf7 !important; /* Tono crema/arena fino */
            border-radius: 8px !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1) !important;
            border: 1px solid #e3dfd5 !important;
            padding: 20px 0 10px 0 !important;
            overflow: hidden !important;
            transition: transform 0.3s ease !important;
        }

        .ranking-card:hover {
            transform: translateY(-5px) !important;
        }

        /* Cabecera interna del Club */
        .card-header {
            display: flex !important;
            align-items: center !important;
            padding: 0 20px 15px 20px !important;
            border-bottom: 2px solid #0f2439 !important; /* Línea de división fina */
        }

        /* Escudo simulado elegante */
        .club-shield-emblem {
            width: 45px !important;
            height: 45px !important;
            background-color: #0f2439 !important;
            border-radius: 6px !important;
            margin-right: 15px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            color: #a4b300 !important;
            font-size: 18px !important;
            font-weight: bold !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
        }

        .club-info-text {
            color: #0f2439 !important;
            font-size: 15px !important;
            font-weight: 700 !important;
            line-height: 1.3 !important;
            text-transform: uppercase !important;
            letter-spacing: 0.5px !important;
        }

        /* Lista de posiciones (Tabla) */
        .ranking-table {
            width: 100% !important;
            border-collapse: collapse !important;
        }

        .ranking-table tr {
            border-bottom: 1px solid #e3dfd5 !important; /* Líneas finas y sutiles */
        }

        .ranking-table tr:last-child {
            border-bottom: none !important;
        }

        /* Celda del número de posición */
        .td-num {
            width: 50px !important;
            text-align: center !important;
            font-size: 16px !important;
            font-weight: 800 !important;
            color: #c23a3a !important; /* Rojo elegante, no chillón */
            padding: 14px 0 !important;
            border-right: 1.5px solid #0f2439 !important; /* Línea vertical fina estilo libreta */
        }

        /* Celda del nombre del jugador */
        .td-name {
            padding: 14px 0 14px 20px !important;
            font-size: 15px !important;
            font-weight: 700 !important;
            color: #0f2439 !important; /* Azul marino distinguido */
        }

        /* Resaltado para filas vacías o diseño de reserva si decides añadir más filas */
        .row-empty {
            color: #b5b0a3 !important;
            font-weight: 400 !important;
            font-style: italic !important;
        }

        /* Diseño responsivo para pantallas pequeñas */
        @media (max-width: 768px) {
            .hero-banner { height: 120px !important; }
            .logo-placeholder { font-size: 26px !important; }
            .rankings-grid { margin-top: 20px !important; }
        }
    </style>
</head>
<body>

    </div>

</body>
</html>
